<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Attendance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:     #0f1923;
      --ink2:    #3d4f61;
      --muted:   #8a98a8;
      --line:    #e4e9ef;
      --bg:      #f3f6f9;
      --surface: #ffffff;
      --blue:    #1a56db;
      --blue-lt: #eff4ff;
      --red:     #c0392b;
      --green:   #166534;
      --amber:   #92400e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

    /* ── Layout ── */
    .topbar {
      background: var(--ink);
      color: #fff;
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .topbar-brand span { color: #7ea8f8; font-weight: 400; font-size: 12px; margin-left: 6px; }
    .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Upload ── */
    .upload-zone {
      border: 1.5px dashed var(--line);
      border-radius: 12px;
      background: var(--surface);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue); background: var(--blue-lt); }
    .upload-icon { width: 40px; height: 40px; background: var(--blue-lt); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .upload-icon svg { color: var(--blue); }
    .upload-title { font-size: 15px; font-weight: 600; color: var(--ink); }
    .upload-sub   { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

    /* ── Stat strip ── */
    .stat-strip { display: flex; gap: 12px; flex-wrap: wrap; }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 130px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .12s;
    }
    .stat-box:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(26,86,219,.10); }
    .stat-box.active { border-color: var(--blue); background: var(--blue-lt); }
    .stat-box .label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
    .stat-box .value { font-size: 26px; font-weight: 600; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }

    /* ── Panel & Toolbar ── */
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }
    .toolbar {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-wrap input { width: 100%; padding: 7px 10px 7px 32px; border: 1px solid var(--line); border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; background: var(--bg); color: var(--ink); transition: border-color .15s; }
    .search-wrap input:focus { border-color: var(--blue); background: var(--surface); }
    .filter-pill { display: flex; align-items: center; gap: 6px; background: var(--blue-lt); border: 1px solid #c3d5f8; color: var(--blue); border-radius: 99px; padding: 3px 10px 3px 12px; font-size: 12px; font-weight: 600; }
    .filter-pill button { background: none; border: none; cursor: pointer; color: var(--blue); font-size: 14px; line-height: 1; padding: 0; }
    .btn { border-radius: 7px; font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; transition: all .12s; }
    .btn-ghost { background: var(--surface); border-color: var(--line); color: var(--ink2); }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
    .btn-export { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }
    .btn-export:hover { background: #145f39; }
    .btn-upload { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-upload:hover { background: #1447b5; }

    /* ── Table ── */
    table { border-collapse: collapse; width: 100%; }
    thead th {
      background: #f8fafb;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      text-align: left;
    }
    tbody tr { border-bottom: 1px solid var(--line); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }
    
    .row-date { padding: 12px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink2); border-right: 1px solid var(--line); white-space: nowrap; vertical-align: top; }
    .row-emp  { padding: 12px 14px; vertical-align: top; border-right: 1px solid var(--line); }
    .row-emp .name { font-weight: 600; font-size: 13px; }
    .row-emp .code { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }

    /* Stacked Punches */
    .punch-cell-split { padding: 12px 14px; vertical-align: top; border-right: 1px solid var(--line); }
    .punch-block { margin-bottom: 12px; }
    .punch-block:last-child { margin-bottom: 0; }
    .punch-time-large { font-family: 'IBM Plex Mono', monospace; font-size: 14px; font-weight: 600; color: var(--ink); }
    .punch-time-large.late { color: var(--red); }
    .punch-code-text { font-size: 11px; color: var(--ink2); font-weight: 500; margin-top: 2px; line-height: 1.4; }
    .punch-loc-small { color: var(--muted); font-size: 11px; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

    /* Badges */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid; }
    .badge-ok      { background: #f0fdf4; color: #166534; border-color: #bbf7d0; }
    .badge-late    { background: #fff5f5; color: #c0392b; border-color: #f5c6c2; }
    .badge-missed  { background: #fffbeb; color: #92400e; border-color: #fde68a; }
    .badge-absent  { background: #fef2f2; color: #dc2626; border-color: #fca5a5; }
    .badge-holiday { background: #f1f5f9; color: #475569; border-color: #cbd5e1; }
    .badge-ot      { background: #fdf4ff; color: #9333ea; border-color: #e9d5ff; }

    .status-cell { padding: 12px 14px; vertical-align: top; white-space: nowrap; text-align: center; }
    .late-mins { font-size: 11px; color: var(--red); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; font-weight: 500; }

    /* ── Footer ── */
    .table-foot { padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid var(--line); background: #f8fafb; }
    .page-info { font-size: 12px; color: var(--muted); }
    .empty { text-align: center; padding: 56px; color: var(--muted); font-size: 13px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7ea8f8" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    HR Attendance
    <span>กะ 09:30–18:30 น.</span>
  </div>
  <div style="display:flex;gap:8px;">
    <button id="exportBtn" onclick="exportExcel()" class="btn btn-export" style="display:none;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button onclick="document.getElementById('fileInput').click()" class="btn btn-upload">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      อัปโหลดไฟล์
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;" onchange="handleFile(event)">
  </div>
</div>

<div class="main">

  <div id="uploadSection">
    <div class="upload-zone" id="dropzone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div class="upload-title">คลิกหรือลากไฟล์มาวางที่นี่</div>
      <div class="upload-sub">รองรับ Excel (.xlsx, .xls) และ CSV</div>
    </div>
  </div>

  <div id="statsSection" style="display:none;">
    <div class="stat-strip" id="statStrip"></div>
  </div>

  <div id="tableSection" style="display:none;" class="panel">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="ค้นหาชื่อหรือรหัสพนักงาน..." oninput="applyFilters()">
      </div>
      <div id="filterPills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      <button onclick="clearFilters()" id="resetBtn" class="btn btn-ghost" style="display:none;">รีเซ็ต</button>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <span id="pageInfo" class="page-info"></span>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th style="min-width:100px;">วันที่</th>
            <th style="min-width:180px;">พนักงาน</th>
            <th style="min-width:180px;">เวลาเข้า (รอบเช้า)</th>
            <th style="min-width:180px;">เวลาออก (รอบบ่าย)</th>
            <th style="min-width:110px;text-align:center;">สถานะ</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="table-foot">
      <span class="page-info" id="pageInfoBottom"></span>
      <div style="display:flex;gap:6px;">
        <button onclick="changePage(-1)" id="prevBtn" class="btn btn-ghost" style="font-size:12px;padding:5px 12px;">← ก่อนหน้า</button>
        <button onclick="changePage(1)"  id="nextBtn" class="btn btn-ghost" style="font-size:12px;padding:5px 12px;">ถัดไป →</button>
      </div>
    </div>
  </div>

</div>

<script>
// ─── Config (ตั้งค่าเวลาและวันหยุดประจำปี) ──────────────────────────────────────────────────
const SHIFT_START_H = 9, SHIFT_START_M = 30;
const LATE_GRACE_MINS = 30;

// รายชื่อวันหยุดนักขัตฤกษ์ปี 2026
const PUBLIC_HOLIDAYS = {
  "01/01/2026": "New Year's Day",
  "02/01/2026": "Substitution for New Year's Day",
  "03/03/2026": "Makha Bucha Day",
  "06/04/2026": "Chakri Day",
  "13/04/2026": "Songkran Day",
  "14/04/2026": "Songkran Day",
  "15/04/2026": "Songkran Day",
  "01/05/2026": "Labour Day",
  "04/05/2026": "Coronation Day",
  "01/06/2026": "Substitution for Visakha Bucha Day",
  "03/06/2026": "H.M. Queen Suthida’s Birthday",
  "28/07/2026": "H.M. King Maha Vajiralongkorn’s Birthday",
  "29/07/2026": "Asanha Bucha Day",
  "12/08/2026": "Mother’s Day",
  "13/10/2026": "H.M. King Bhumibol Adulyadej Memorial Day",
  "23/10/2026": "H.M. King Chulalongkorn Memorial Day",
  "07/12/2026": "Father’s Day / National Day",
  "10/12/2026": "Constitution Day",
  "31/12/2026": "New Year's Eve"
};

// ─── State ───────────────────────────────────────────────────
let allGroups = [];
let filtered  = [];
let currentPage = 1;
const PER_PAGE = 40;
let activeStatus = '';

// ─── Upload ──────────────────────────────────────────────────
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) processFile(f);
});
function handleFile(ev) { const f = ev.target.files[0]; if (f) processFile(f); }

function processFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb  = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { raw: false, defval: '' });
      buildGroups(raw);
    } catch(err) { alert('อ่านไฟล์ไม่ได้: ' + err); }
  };
  r.readAsArrayBuffer(file);
}

// ─── Date helpers ────────────────────────────────────────────
function toDateObj(d) {
  if (!d) return null;
  d = String(d).trim();
  
  let yyyy, mm, dd;

  if (/^\d{4}-\d{2}-\d{2}/.test(d)) {
    let p = d.slice(0, 10).split('-');
    yyyy = parseInt(p[0]); mm = parseInt(p[1]); dd = parseInt(p[2]);
  } else if (/^\d{2}\/\d{2}\/\d{4}$/.test(d)) {
    let p = d.split('/');
    yyyy = parseInt(p[2]); mm = parseInt(p[1]); dd = parseInt(p[0]);
  } else if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)) {
    let p = d.split('/');
    yyyy = parseInt(p[2]); mm = parseInt(p[0]); dd = parseInt(p[1]);
  } else if (/^\d{4,6}$/.test(d)) {
    const dt = new Date(Math.round((parseInt(d) - 25569) * 86400 * 1000));
    return new Date(dt.getUTCFullYear(), dt.getUTCMonth(), dt.getUTCDate(), 12, 0, 0);
  } else {
    return null;
  }

  if (yyyy > 2500) yyyy -= 543;
  return new Date(yyyy, mm - 1, dd, 12, 0, 0);
}

// ─── Build groups & Fill Missing Dates ────────────────────────
function buildGroups(raw) {
  const map = {};
  const empMap = {};
  let globalMin = null;
  let globalMax = null;

  raw.forEach(row => {
    const empRaw   = String(row['EmployeeCodeName'] || '').trim();
    const dash     = empRaw.indexOf('-');
    const code     = dash > -1 ? empRaw.slice(0, dash).trim() : empRaw;
    const name     = dash > -1 ? empRaw.slice(dash + 1).trim() : '';
    const dateRaw  = String(row['ClockDate']    || '').trim();
    const timeStr  = String(row['ClockTime']    || '').trim();
    const clockCode= String(row['ClockCode']    || '').trim(); 
    const clockName= String(row['ClockName']    || '').trim();
    const location = String(row['LocationName'] || '').trim();

    if (!code || !dateRaw || !timeStr) return;
    empMap[code] = name;

    const dObj = toDateObj(dateRaw);
    if (dObj) {
      const t = dObj.getTime();
      if (!globalMin || t < globalMin) globalMin = t;
      if (!globalMax || t > globalMax) globalMax = t;

      const dd = String(dObj.getDate()).padStart(2, '0');
      const mm = String(dObj.getMonth() + 1).padStart(2, '0');
      const yyyy = dObj.getFullYear();
      const dateFmt = `${dd}/${mm}/${yyyy}`;
      const key = code + '|' + dateFmt;

      if (!map[key]) map[key] = { date: dateFmt, dateSort: t, code, name, punches: [] };
      map[key].punches.push({ time: timeStr, clockCode: clockCode, clockName: clockName, location: location });
    }
  });

  if (globalMin && globalMax) {
    let startDate = new Date(globalMin);
    startDate.setDate(1); 
    startDate.setHours(12, 0, 0, 0);

    let endDate = new Date(globalMax);
    endDate.setMonth(endDate.getMonth() + 1, 0); 
    endDate.setHours(12, 0, 0, 0);

    Object.keys(empMap).forEach(code => {
      const name = empMap[code];
      let curr = new Date(startDate);

      while(curr <= endDate) {
        const dd = String(curr.getDate()).padStart(2, '0');
        const mm = String(curr.getMonth() + 1).padStart(2, '0');
        const yyyy = curr.getFullYear();
        const dateFmt = `${dd}/${mm}/${yyyy}`;
        const key = code + '|' + dateFmt;
        
        let holidayName = PUBLIC_HOLIDAYS[dateFmt];

        if (!map[key]) {
          const dow = curr.getDay(); 
          let status = 'ขาดงาน';
          
          if (holidayName) {
            status = 'วันหยุดนักขัตฤกษ์';
          } else if (dow === 0 || dow === 6) {
            status = 'วันหยุด';
          }

          map[key] = { date: dateFmt, dateSort: curr.getTime(), code, name, punches: [], status: status, lateMins: 0, holidayName: holidayName };
        } else {
          // ถ้ามีข้อมูลตอกบัตร แต่ตรงกับวันหยุดนักขัตฤกษ์ ก็ต้องเก็บชื่อวันหยุดไว้ด้วย
          map[key].holidayName = holidayName;
        }
        curr.setDate(curr.getDate() + 1); 
      }
    });
  }

  allGroups = Object.values(map).map(g => {
    if (g.punches.length > 0) {
      g.punches.sort((a, b) => a.time.localeCompare(b.time));

      const firstTime = g.punches[0].time;
      const [fh, fm] = firstTime.split(':').map(Number);
      const firstMins = fh * 60 + fm;
      const shiftMins = SHIFT_START_H * 60 + SHIFT_START_M;
      const lateThresh = shiftMins + LATE_GRACE_MINS;

      const d = new Date(g.dateSort);
      const dow = d.getDay();

      let status = 'ปกติ';
      let lateMins = 0;

      if (g.punches.length === 1) {
        status = 'ลืมตอกออก';
      } else if (firstMins > lateThresh) {
        status = 'มาสาย';
        lateMins = firstMins - shiftMins;
      } else if (dow === 0 || dow === 6 || g.holidayName) {
        // ถ้าระบบพบว่าวันนั้นตอกบัตร และตรงกับวันหยุด(ส-อา) หรือวันหยุดนักขัตฤกษ์
        status = 'ทำงานวันหยุด';
      }
      g.status = status;
      g.lateMins = lateMins;
    }
    return g;
  });

  allGroups.sort((a, b) => a.dateSort - b.dateSort || a.code.localeCompare(b.code));

  renderStats();
  applyFilters();
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('statsSection').style.display  = 'block';
  document.getElementById('tableSection').style.display  = 'block';
  document.getElementById('exportBtn').style.display     = 'inline-flex';
}

// ─── Stats ───────────────────────────────────────────────────
function renderStats() {
  const total  = allGroups.length;
  const late   = allGroups.filter(g => g.status === 'มาสาย').length;
  const missed = allGroups.filter(g => g.status === 'ลืมตอกออก').length;
  const absent = allGroups.filter(g => g.status === 'ขาดงาน').length;

  document.getElementById('statStrip').innerHTML = `
    <div class="stat-box ${activeStatus===''?'active':''}" onclick="setStatusFilter('')">
      <div class="label">ทั้งหมด</div>
      <div class="value" style="color:var(--ink);">${total}</div>
    </div>
    <div class="stat-box ${activeStatus==='ขาดงาน'?'active':''}" onclick="setStatusFilter('ขาดงาน')">
      <div class="label">ขาดงาน</div>
      <div class="value" style="color:#dc2626;">${absent}</div>
    </div>
    <div class="stat-box ${activeStatus==='มาสาย'?'active':''}" onclick="setStatusFilter('มาสาย')">
      <div class="label">มาสาย</div>
      <div class="value" style="color:#c0392b;">${late}</div>
    </div>
    <div class="stat-box ${activeStatus==='ลืมตอกออก'?'active':''}" onclick="setStatusFilter('ลืมตอกออก')">
      <div class="label">ลืมตอกออก</div>
      <div class="value" style="color:#92400e;">${missed}</div>
    </div>
  `;
}
function setStatusFilter(s) {
  activeStatus = s;
  renderStats();
  applyFilters();
}

// ─── Filters ─────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = allGroups.filter(g => {
    const mQ = !q || (g.code + ' ' + g.name).toLowerCase().includes(q);
    const mS = !activeStatus || g.status === activeStatus;
    return mQ && mS;
  });

  const pills = document.getElementById('filterPills'); pills.innerHTML = '';
  if (activeStatus) pills.innerHTML += `<span class="filter-pill">สถานะ: ${activeStatus} <button onclick="setStatusFilter('')">×</button></span>`;
  if (q)            pills.innerHTML += `<span class="filter-pill">"${q}" <button onclick="document.getElementById('searchInput').value='';applyFilters()">×</button></span>`;
  document.getElementById('resetBtn').style.display = (activeStatus || q) ? 'inline-flex' : 'none';

  currentPage = 1;
  renderTable();
}
function clearFilters() { activeStatus = ''; document.getElementById('searchInput').value = ''; renderStats(); applyFilters(); }

// ─── Table ───────────────────────────────────────────────────
function badgeCls(s) {
  if (s === 'ปกติ') return 'badge-ok';
  if (s === 'มาสาย') return 'badge-late';
  if (s === 'วันหยุด' || s === 'วันหยุดนักขัตฤกษ์') return 'badge-holiday';
  if (s === 'ขาดงาน') return 'badge-absent';
  if (s === 'ทำงานวันหยุด') return 'badge-ot';
  return 'badge-missed';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty">ไม่พบข้อมูล</div></td></tr>`;
    updatePagination();
    return;
  }

  const start = (currentPage - 1) * PER_PAGE;
  const end   = Math.min(start + PER_PAGE, filtered.length);

  filtered.slice(start, end).forEach(g => {
    
    const morningPunches = g.punches.filter(p => p.time < "12:00");
    const afternoonPunches = g.punches.filter(p => p.time >= "12:00");

    const renderPunches = (punches, isMorning) => {
      // ถ้าระบบไม่มีข้อมูลตอกบัตร และวันนั้นเป็นวันหยุดนักขัตฤกษ์ จะโชว์ชื่อเทศกาลขึ้นมาในตารางฝั่งเช้า
      if (!punches || punches.length === 0) {
        if (isMorning && g.status === 'วันหยุดนักขัตฤกษ์') {
          return `<div class="punch-loc-small" style="color: var(--blue); font-weight: 600; font-size: 12px; margin-top: 6px;">✨ ${g.holidayName}</div>`;
        }
        return '<span style="color:var(--muted)">—</span>';
      }
      
      return punches.map((p, index) => {
        const isLate = isMorning && index === 0 && g.status === 'มาสาย';
        const timeCls = isLate ? 'punch-time-large late' : 'punch-time-large';
        
        const codeDisplayArray = [];
        if (p.clockCode) codeDisplayArray.push(p.clockCode);
        if (p.clockName) codeDisplayArray.push(p.clockName);
        const codeDisplayText = codeDisplayArray.join(' - ');
        const codeHtml = codeDisplayText ? `<div class="punch-code-text">${codeDisplayText}</div>` : '';
        
        return `
          <div class="punch-block">
            <div class="${timeCls}">${p.time}</div>
            ${codeHtml}
            <div class="punch-loc-small" title="${p.location}">${p.location || '—'}</div>
          </div>
        `;
      }).join('');
    };

    const morningHtml = renderPunches(morningPunches, true);
    const afternoonHtml = renderPunches(afternoonPunches, false);

    const badgeHtml = `<span class="badge ${badgeCls(g.status)}">${g.status}</span>` +
      (g.lateMins > 0 ? `<div class="late-mins">+${g.lateMins} นาที</div>` : '');

    tbody.innerHTML += `<tr>
      <td class="row-date">${g.date}</td>
      <td class="row-emp">
        <div class="name">${g.name}</div>
        <div class="code">${g.code}</div>
      </td>
      <td class="punch-cell-split">${morningHtml}</td>
      <td class="punch-cell-split">${afternoonHtml}</td>
      <td class="status-cell">${badgeHtml}</td>
    </tr>`;
  });

  updatePagination(start, end);
}

function updatePagination(start, end) {
  const total = filtered.length;
  const info  = total ? `${(start||0)+1}–${end||0} จาก ${total.toLocaleString()} รายการ` : '';
  document.getElementById('pageInfo').innerText        = info;
  document.getElementById('pageInfoBottom').innerText  = info;
  document.getElementById('prevBtn').disabled = currentPage === 1;
  document.getElementById('nextBtn').disabled = !filtered.length || (end >= filtered.length);
}
function changePage(d) { currentPage += d; renderTable(); window.scrollTo(0,0); }

// ─── Export ──────────────────────────────────────────────────
function exportExcel() {
  if (!filtered.length) { alert('ไม่มีข้อมูล'); return; }
  const rows = [];
  
  filtered.forEach(g => {
    const mPunches = g.punches.filter(p => p.time < "12:00");
    const aPunches = g.punches.filter(p => p.time >= "12:00");

    const maxRows = Math.max(mPunches.length, aPunches.length, 1);

    for (let i = 0; i < maxRows; i++) {
      const m = mPunches[i] || {};
      const a = aPunches[i] || {};

      rows.push({
        'วันที่':           g.date,
        'รหัสพนักงาน':     g.code,
        'ชื่อพนักงาน':     g.name,
        'เช้า':            m.time || '—',
        'Clock Code เช้า': m.clockCode || '—',
        'Clock Name เช้า': (i === 0 && g.status === 'วันหยุดนักขัตฤกษ์' && !m.time) ? g.holidayName : (m.clockName || '—'),
        'สถานที่ เช้า':     m.location || '—',
        'บ่าย':            a.time || '—',
        'Clock Code บ่าย': a.clockCode || '—',
        'Clock Name บ่าย': a.clockName || '—',
        'สถานที่ บ่าย':     a.location || '—',
        'สถานะวัน':        g.status,
        'สาย (นาที)':      g.lateMins || 0,
      });
    }
  });

  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Attendance Detailed');
  XLSX.writeFile(wb, 'Attendance_Export.xlsx');
}
</script>
