<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR Attendance</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:     #0f1923;
      --ink2:    #3d4f61;
      --muted:   #8a98a8;
      --line:    #e4e9ef;
      --bg:      #f3f6f9;
      --surface: #ffffff;
      --blue:    #1a56db;
      --blue-lt: #eff4ff;
      --red:     #c0392b;
      --red-lt:  #fff5f5;
      --red-bd:  #f5c6c2;
      --green:   #166534;
      --green-lt:#f0fdf4;
      --green-bd:#bbf7d0;
      --amber:   #92400e;
      --amber-lt:#fffbeb;
      --amber-bd:#fde68a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'IBM Plex Sans Thai', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 2px; }

    /* ── Layout ── */
    .topbar {
      background: var(--ink);
      color: #fff;
      padding: 0 28px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -.01em;
    }
    .topbar-brand span { color: #7ea8f8; font-weight: 400; font-size: 12px; margin-left: 6px; }
    .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }

    /* ── Upload ── */
    .upload-zone {
      border: 1.5px dashed var(--line);
      border-radius: 12px;
      background: var(--surface);
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .upload-zone:hover, .upload-zone.drag-over { border-color: var(--blue); background: var(--blue-lt); }
    .upload-icon { width: 40px; height: 40px; background: var(--blue-lt); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; }
    .upload-icon svg { color: var(--blue); }
    .upload-title { font-size: 15px; font-weight: 600; color: var(--ink); }
    .upload-sub   { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.6; }

    /* ── Stat strip ── */
    .stat-strip { display: flex; gap: 12px; }
    .stat-box {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px 20px;
      min-width: 140px;
      cursor: pointer;
      transition: border-color .15s, box-shadow .12s;
    }
    .stat-box:hover { border-color: var(--blue); box-shadow: 0 2px 8px rgba(26,86,219,.10); }
    .stat-box.active { border-color: var(--blue); background: var(--blue-lt); }
    .stat-box .label { font-size: 10px; font-weight: 600; letter-spacing: .07em; text-transform: uppercase; color: var(--muted); }
    .stat-box .value { font-size: 26px; font-weight: 600; margin-top: 4px; font-family: 'IBM Plex Mono', monospace; }
    .stat-box.red   .value { color: var(--red); }
    .stat-box.green .value { color: var(--green); }

    /* ── Panel ── */
    .panel { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; overflow: hidden; }

    /* ── Toolbar ── */
    .toolbar {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      flex-wrap: wrap;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 320px; }
    .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    .search-wrap input { width: 100%; padding: 7px 10px 7px 32px; border: 1px solid var(--line); border-radius: 7px; font-size: 13px; font-family: inherit; outline: none; background: var(--bg); color: var(--ink); transition: border-color .15s; }
    .search-wrap input:focus { border-color: var(--blue); background: var(--surface); }
    .search-wrap input::placeholder { color: var(--muted); }

    .filter-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--blue-lt);
      border: 1px solid #c3d5f8;
      color: var(--blue);
      border-radius: 99px;
      padding: 3px 10px 3px 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .filter-pill button { background: none; border: none; cursor: pointer; color: var(--blue); font-size: 14px; line-height: 1; padding: 0; }

    .btn { border-radius: 7px; font-size: 12px; font-weight: 600; padding: 7px 14px; cursor: pointer; border: 1px solid transparent; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; transition: all .12s; }
    .btn-ghost { background: var(--surface); border-color: var(--line); color: var(--ink2); }
    .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }
    .btn-export { background: #1a7a4a; color: #fff; border-color: #1a7a4a; }
    .btn-export:hover { background: #145f39; }
    .btn-upload { background: var(--blue); color: #fff; border-color: var(--blue); }
    .btn-upload:hover { background: #1447b5; }

    /* ── Table ── */
    table { border-collapse: collapse; width: 100%; }
    thead th {
      background: #f8fafb;
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
      text-align: left;
    }
    tbody tr { border-bottom: 1px solid var(--line); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }
    tbody td { padding: 0; vertical-align: top; }

    /* punch group rows */
    .row-date { padding: 12px 14px 12px 14px; font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink2); border-right: 1px solid var(--line); white-space: nowrap; vertical-align: top; }
    .row-emp  { padding: 12px 14px; vertical-align: top; border-right: 1px solid var(--line); }
    .row-emp .name { font-weight: 600; font-size: 13px; }
    .row-emp .code { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-top: 1px; }
    .punches-cell { padding: 0; }
    .punch-row {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 9px 14px;
      border-bottom: 1px solid #f0f3f6;
      font-size: 12px;
    }
    .punch-row:last-child { border-bottom: none; }
    .punch-time { font-family: 'IBM Plex Mono', monospace; font-weight: 500; min-width: 54px; color: var(--ink); }
    .punch-time.late { color: var(--red); }
    .punch-code { color: var(--muted); min-width: 60px; margin-left: 12px; }
    .punch-name { color: var(--ink2); flex: 1; margin-left: 8px; }
    .punch-location { color: var(--muted); font-size: 11px; margin-left: 8px; text-align: right; flex-shrink: 0; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* badges */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; border: 1px solid; }
    .badge-ok     { background: var(--green-lt); color: var(--green); border-color: var(--green-bd); }
    .badge-late   { background: var(--red-lt);   color: var(--red);   border-color: var(--red-bd); }
    .badge-missed { background: var(--amber-lt); color: var(--amber); border-color: var(--amber-bd); }

    .status-cell { padding: 12px 14px; vertical-align: top; white-space: nowrap; border-left: 1px solid var(--line); }
    .late-mins { font-size: 11px; color: var(--red); margin-top: 3px; font-family: 'IBM Plex Mono', monospace; }

    /* ── Footer / pagination ── */
    .table-foot {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--line);
      background: #f8fafb;
    }
    .page-info { font-size: 12px; color: var(--muted); }

    /* ── Empty ── */
    .empty { text-align: center; padding: 56px; color: var(--muted); font-size: 13px; }

    /* ── Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,16,24,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface);
      border-radius: 12px;
      width: 100%;
      max-width: 680px;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-head {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-body { overflow-y: auto; flex: 1; }

    @media (max-width: 700px) {
      .stat-strip { flex-wrap: wrap; }
      .punch-location { display: none; }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div class="topbar">
  <div class="topbar-brand">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7ea8f8" stroke-width="2.2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    HR Attendance
    <span>กะ 09:30–18:30 น.</span>
  </div>
  <div style="display:flex;gap:8px;">
    <button id="exportBtn" onclick="exportExcel()" class="btn btn-export" style="display:none;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button onclick="document.getElementById('fileInput').click()" class="btn btn-upload">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      อัปโหลดไฟล์
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none;" onchange="handleFile(event)">
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div id="statsSection" style="display:none;">
    <div class="stat-strip" id="statStrip"></div>
  </div>

  <!-- Table panel -->
  <div id="tableSection" style="display:none;" class="panel">
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="ค้นหาชื่อหรือรหัสพนักงาน..." oninput="applyFilters()">
      </div>
      <div id="filterPills" style="display:flex;gap:6px;flex-wrap:wrap;"></div>
      <button onclick="clearFilters()" id="resetBtn" class="btn btn-ghost" style="display:none;">รีเซ็ต</button>
      <div style="margin-left:auto;display:flex;gap:6px;">
        <span id="pageInfo" class="page-info"></span>
      </div>
    </div>

    <div style="overflow-x:auto;">
      <table>
        <thead>
          <tr>
            <th style="min-width:100px;">วันที่</th>
            <th style="min-width:180px;">พนักงาน</th>
            <th>บันทึกการตอกบัตร</th>
            <th style="min-width:100px;text-align:center;border-left:1px solid var(--line);">สถานะ</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <div class="table-foot">
      <span class="page-info" id="pageInfoBottom"></span>
      <div style="display:flex;gap:6px;">
        <button onclick="changePage(-1)" id="prevBtn" class="btn btn-ghost" style="font-size:12px;padding:5px 12px;">← ก่อนหน้า</button>
        <button onclick="changePage(1)"  id="nextBtn" class="btn btn-ghost" style="font-size:12px;padding:5px 12px;">ถัดไป →</button>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <div>
        <div style="font-weight:700;font-size:14px;" id="modalTitle"></div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">ประวัติการตอกบัตร</div>
      </div>
      <button onclick="closeModal()" class="btn btn-ghost" style="padding:4px 8px;">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ─── Config ──────────────────────────────────────────────────
const SHIFT_START_H = 9, SHIFT_START_M = 30;
const LATE_GRACE_MINS = 30; // มาสายหลัง 10:00

// ─── State ───────────────────────────────────────────────────
let allGroups = [];      // [{date, dateSort, code, name, punches[], status, lateMins}]
let filtered  = [];
let currentPage = 1;
const PER_PAGE = 40;
let activeStatus = '';

// ─── Upload ──────────────────────────────────────────────────
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const f = e.dataTransfer.files[0]; if (f) processFile(f);
});
function handleFile(ev) { const f = ev.target.files[0]; if (f) processFile(f); }

function processFile(file) {
  const r = new FileReader();
  r.onload = e => {
    try {
      const wb  = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
      const raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
      buildGroups(raw);
    } catch(err) { alert('อ่านไฟล์ไม่ได้: ' + err); }
  };
  r.readAsArrayBuffer(file);
}

// ─── Build groups ─────────────────────────────────────────────
// Each group = one employee × one calendar date, with ALL punch rows
function buildGroups(raw) {
  const map = {};

  raw.forEach(row => {
    const empRaw   = String(row['EmployeeCodeName'] || '').trim();
    const dash     = empRaw.indexOf('-');
    const code     = dash > -1 ? empRaw.slice(0, dash).trim() : empRaw;
    const name     = dash > -1 ? empRaw.slice(dash + 1).trim() : '';
    const dateRaw  = String(row['ClockDate']    || '').trim();
    const timeStr  = String(row['ClockTime']    || '').trim();
    const clockCode= String(row['ClockCode']    || '').trim();
    const clockName= String(row['ClockName']    || '').trim();
    const location = String(row['LocationName'] || '').trim();

    if (!code || !dateRaw || !timeStr) return;

    // Format date → dd/mm/yyyy
    const dateFmt = formatDate(dateRaw);
    const dateSort = toDateSort(dateRaw);

    const key = code + '|' + dateRaw;
    if (!map[key]) map[key] = { date: dateFmt, dateSort, code, name, punches: [] };
    map[key].punches.push({ time: timeStr, clockCode, clockName, location });
  });

  // Sort punches per group, then determine status
  allGroups = Object.values(map).map(g => {
    g.punches.sort((a, b) => a.time.localeCompare(b.time));

    const firstTime = g.punches[0].time;
    const [fh, fm] = firstTime.split(':').map(Number);
    const firstMins = fh * 60 + fm;
    const shiftMins = SHIFT_START_H * 60 + SHIFT_START_M;
    const lateThresh = shiftMins + LATE_GRACE_MINS;

    let status = 'ปกติ', lateMins = 0;
    if (g.punches.length === 1) {
      status = 'ลืมตอกออก';
    } else if (firstMins > lateThresh) {
      status = 'มาสาย';
      lateMins = firstMins - shiftMins;
    }
    g.status   = status;
    g.lateMins = lateMins;
    return g;
  });

  // Sort by date asc, then code
  allGroups.sort((a, b) => a.dateSort - b.dateSort || a.code.localeCompare(b.code));

  renderStats();
  applyFilters();
  document.getElementById('uploadSection').style.display = 'none';
  document.getElementById('statsSection').style.display  = 'block';
  document.getElementById('tableSection').style.display  = 'block';
  document.getElementById('exportBtn').style.display     = 'inline-flex';
}

// ─── Date helpers ────────────────────────────────────────────
function formatDate(d) {
  // Accept YYYY-MM-DD or DD/MM/YYYY or serial (number)
  if (!d) return '';
  d = String(d).trim();
  // already dd/mm/yyyy
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(d)) return d;
  // yyyy-mm-dd
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) {
    const [y, mo, day] = d.slice(0, 10).split('-');
    return `${day}/${mo}/${y}`;
  }
  // mm/dd/yyyy (US)
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)) {
    const p = d.split('/');
    return `${p[1].padStart(2,'0')}/${p[0].padStart(2,'0')}/${p[2]}`;
  }
  // Excel serial number
  if (/^\d{4,6}$/.test(d)) {
    const dt = new Date(Math.round((+d - 25569) * 86400 * 1000));
    const dd = String(dt.getUTCDate()).padStart(2,'0');
    const mm = String(dt.getUTCMonth()+1).padStart(2,'0');
    const yy = dt.getUTCFullYear();
    return `${dd}/${mm}/${yy}`;
  }
  return d;
}
function toDateSort(d) {
  d = String(d).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(d)) return new Date(d.slice(0,10)).getTime();
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(d)) { const p=d.split('/'); return new Date(`${p[2]}-${p[1]}-${p[0]}`).getTime(); }
  if (/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)) { const p=d.split('/'); return new Date(`${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`).getTime(); }
  if (/^\d{4,6}$/.test(d)) return (parseInt(d) - 25569) * 86400000;
  return 0;
}

// ─── Stats ───────────────────────────────────────────────────
function renderStats() {
  const total  = allGroups.length;
  const late   = allGroups.filter(g => g.status === 'มาสาย').length;
  const missed = allGroups.filter(g => g.status === 'ลืมตอกออก').length;
  const normal = allGroups.filter(g => g.status === 'ปกติ').length;

  document.getElementById('statStrip').innerHTML = `
    <div class="stat-box green ${activeStatus===''?'active':''}" onclick="setStatusFilter('')">
      <div class="label">ทั้งหมด</div>
      <div class="value" style="color:var(--ink);">${total}</div>
    </div>
    <div class="stat-box green ${activeStatus==='ปกติ'?'active':''}" onclick="setStatusFilter('ปกติ')">
      <div class="label">ปกติ</div>
      <div class="value">${normal}</div>
    </div>
    <div class="stat-box red ${activeStatus==='มาสาย'?'active':''}" onclick="setStatusFilter('มาสาย')">
      <div class="label">มาสาย</div>
      <div class="value">${late}</div>
    </div>
    <div class="stat-box ${activeStatus==='ลืมตอกออก'?'active':''}" onclick="setStatusFilter('ลืมตอกออก')">
      <div class="label">ลืมตอกออก</div>
      <div class="value" style="color:var(--amber);">${missed}</div>
    </div>
  `;
}
function setStatusFilter(s) {
  activeStatus = s;
  renderStats();
  applyFilters();
}

// ─── Filters ─────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  filtered = allGroups.filter(g => {
    const mQ = !q || (g.code + ' ' + g.name).toLowerCase().includes(q);
    const mS = !activeStatus || g.status === activeStatus;
    return mQ && mS;
  });

  // Pills
  const pills = document.getElementById('filterPills'); pills.innerHTML = '';
  if (activeStatus) pills.innerHTML += `<span class="filter-pill">สถานะ: ${activeStatus} <button onclick="setStatusFilter('')">×</button></span>`;
  if (q)            pills.innerHTML += `<span class="filter-pill">"${q}" <button onclick="document.getElementById('searchInput').value='';applyFilters()">×</button></span>`;
  document.getElementById('resetBtn').style.display = (activeStatus || q) ? 'inline-flex' : 'none';

  currentPage = 1;
  renderTable();
}
function clearFilters() {
  activeStatus = '';
  document.getElementById('searchInput').value = '';
  renderStats();
  applyFilters();
}

// ─── Table ───────────────────────────────────────────────────
function badgeCls(s) {
  if (s === 'ปกติ') return 'badge-ok';
  if (s === 'มาสาย') return 'badge-late';
  return 'badge-missed';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty">ไม่พบข้อมูล</div></td></tr>`;
    updatePagination();
    return;
  }

  const start = (currentPage - 1) * PER_PAGE;
  const end   = Math.min(start + PER_PAGE, filtered.length);

  filtered.slice(start, end).forEach(g => {
    const punchesHtml = g.punches.map(p => {
      const [ph, pm] = p.time.split(':').map(Number);
      const pMins = ph * 60 + pm;
      const shiftMins = SHIFT_START_H * 60 + SHIFT_START_M + LATE_GRACE_MINS;
      const isFirstLate = g.status === 'มาสาย' && p === g.punches[0];
      const timeCls = isFirstLate ? 'punch-time late' : 'punch-time';
      return `<div class="punch-row">
        <span class="${timeCls}">${p.time}</span>
        <span class="punch-code">${p.clockCode || '—'}</span>
        <span class="punch-name">${p.clockName || '—'}</span>
        <span class="punch-location" title="${p.location}">${p.location || '—'}</span>
      </div>`;
    }).join('');

    const badgeHtml = `<span class="badge ${badgeCls(g.status)}">${g.status}</span>` +
      (g.lateMins > 0 ? `<div class="late-mins">+${g.lateMins} นาที</div>` : '');

    tbody.innerHTML += `<tr>
      <td class="row-date">${g.date}</td>
      <td class="row-emp">
        <div class="name">${g.name}</div>
        <div class="code">${g.code}</div>
      </td>
      <td class="punches-cell">${punchesHtml}</td>
      <td class="status-cell" style="text-align:center;">${badgeHtml}</td>
    </tr>`;
  });

  updatePagination(start, end);
}

function updatePagination(start, end) {
  const total = filtered.length;
  const info  = total ? `${(start||0)+1}–${end||0} จาก ${total.toLocaleString()} รายการ` : '';
  document.getElementById('pageInfo').innerText       = info;
  document.getElementById('pageInfoBottom').innerText = info;
  document.getElementById('prevBtn').disabled = currentPage === 1;
  document.getElementById('nextBtn').disabled = !filtered.length || (end >= filtered.length);
}
function changePage(d) { currentPage += d; renderTable(); window.scrollTo(0,0); }

// ─── Export ──────────────────────────────────────────────────
function exportExcel() {
  if (!filtered.length) { alert('ไม่มีข้อมูล'); return; }
  const rows = [];
  filtered.forEach(g => {
    g.punches.forEach(p => {
      rows.push({
        'วันที่':           g.date,
        'รหัสพนักงาน':     g.code,
        'ชื่อพนักงาน':     g.name,
        'เวลาตอกบัตร':     p.time,
        'ClockCode':       p.clockCode,
        'ClockName':       p.clockName,
        'สถานที่':         p.location,
        'สถานะวัน':        g.status,
        'สาย (นาที)':      g.lateMins || 0,
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Attendance');
  XLSX.writeFile(wb, 'Attendance_Export.xlsx');
}

// ─── Modal ───────────────────────────────────────────────────
function openModal(code, name) {
  document.getElementById('modalTitle').innerText = `${code} · ${name}`;
  const recs = allGroups.filter(g => g.code === code);
  let html = '';
  recs.forEach(g => {
    html += `<div style="padding:10px 20px;border-bottom:1px solid var(--line);">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
        <span style="font-size:12px;font-family:'IBM Plex Mono',monospace;color:var(--ink2);">${g.date}</span>
        <span class="badge ${badgeCls(g.status)}">${g.status}</span>
        ${g.lateMins > 0 ? `<span style="font-size:11px;color:var(--red);font-family:'IBM Plex Mono',monospace;">+${g.lateMins} น.</span>` : ''}
      </div>
      ${g.punches.map(p=>`
        <div class="punch-row" style="padding:5px 0;">
          <span class="punch-time">${p.time}</span>
          <span class="punch-code">${p.clockCode||'—'}</span>
          <span class="punch-name">${p.clockName||'—'}</span>
          <span class="punch-location">${p.location||'—'}</span>
        </div>`).join('')}
    </div>`;
  });
  document.getElementById('modalBody').innerHTML = html || '<div class="empty">ไม่มีข้อมูล</div>';
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
</script>
